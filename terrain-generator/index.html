<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор 3D ландшафта - Дипломный проект</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="authPage">
        <div id="authBox">
            <div class="auth-logo">ГЕНЕРАТОР 3D ЛАНДШАФТА</div>

            <div id="loginForm">
                <h2>Вход</h2>

                <input id="loginUsername" type="text" placeholder="Имя пользователя">
                <input id="loginEmail" type="email" placeholder="Email">
                <input id="loginPassword" type="password" placeholder="Пароль">

                <button id="loginBtn" class="auth-main-btn">Войти</button>

                <p class="auth-switch-text">
                    Ещё нет аккаунта?
                    <button id="showRegisterBtn" class="auth-link-btn">Зарегистрируйтесь</button>
                </p>
            </div>

            <div id="registerForm" style="display: none;">
                <h2>Регистрация</h2>

                <input id="registerUsername" type="text" placeholder="Имя пользователя">
                <input id="registerEmail" type="email" placeholder="Email">
                <input id="registerPassword" type="password" placeholder="Пароль">
                <input id="registerPasswordRepeat" type="password" placeholder="Повторите пароль">

                <button id="registerBtn" class="auth-main-btn">Зарегистрироваться</button>

                <p class="auth-switch-text">
                    Уже есть аккаунт?
                    <button id="showLoginBtn" class="auth-link-btn">Войти</button>
                </p>
            </div>

            <p id="authStatus"></p>
        </div>
    </div>

    <div id="appPage" style="display: none;">

        <div id="info">
            ГЕНЕРАТОР 3D ЛАНДШАФТА
        </div>

        <div id="accountPanel">
            <button id="accountBtn">
                <span id="accountAvatar">👤</span>
                <span id="accountName">Аккаунт</span>
            </button>

            <div id="accountDropdown">
                <div class="account-title">Профиль</div>

                <div class="account-row">
                    <span>Имя:</span>
                    <strong id="profileUsername">—</strong>
                </div>

                <div class="account-row">
                    <span>Email:</span>
                    <strong id="profileEmail">—</strong>
                </div>

                <div class="account-row">
                    <span>Статус:</span>
                    <strong>Авторизован</strong>
                </div>

                <button id="accountLogoutBtn">Выйти</button>
            </div>
        </div>

            <div id="paramsPanel">
        <button id="paramsToggleBtn">Параметры</button>

        <div id="paramsContent" style="display: none;">
            <h3>Параметры генерации</h3>

            <div class="param-item">
                <label>Высота рельефа: <span id="heightScaleValue">0</span></label>
                <input id="heightScaleInput" type="range" min="0" max="2.5" step="0.1" value="0">
            </div>

            <div class="param-item">
                <label>Шероховатость: <span id="roughnessValue">0</span></label>
                <input id="roughnessInput" type="range" min="0" max="1.0" step="0.05" value="0">
            </div>

            <div class="param-item">
                <label>Плотность растительности: <span id="treeDensityValue">0</span></label>
                <input id="treeDensityInput" type="range" min="0" max="1" step="0.05" value="0">
            </div>

            <div class="param-item">
                <label>Количество возвышенностей: <span id="mountainCountValue">0</span></label>
                <input id="mountainCountInput" type="range" min="0" max="8" step="1" value="0">
            </div>

            <div class="params-buttons">
                <button id="resetParamsBtn">Сброс</button>
                <button id="randomParamsBtn">Случайно</button>
            </div>
        </div>
    </div>

        <div id="controls">
            <textarea id="prompt" rows="1" placeholder="Опишите ландшафт..."></textarea>
            <button id="generateBtn">Создать мир</button>
            <button id="clearBtn" class="clear-btn">Очистить</button>
            <button id="exportObjBtn" style="background: #FF9800;">OBJ</button>
            <div class="status" id="status">Введите описание и нажмите "Создать мир"</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Reflector.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/OBJExporter.js"></script>

    <script src="js/perlin.js"></script>
    <script src="js/terrain/colors.js"></script>
    <script src="js/terrain/heights.js"></script>
    <script src="js/terrain/water.js"></script>
    <script src="js/terrain/vegetation.js"></script>
    <script src="js/terrain/terrain.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
